<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c2438"/>
      <stop offset="100%" stop-color="#0a0e17"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4dd8c0"/>
      <stop offset="100%" stop-color="#8b8cf8"/>
    </linearGradient>
    <linearGradient id="person" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a4360"/>
      <stop offset="100%" stop-color="#2a3146"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" rx="28" fill="url(#bg)"/>

  <!-- dashed border to indicate placeholder -->
  <rect x="6" y="6" width="388" height="388" rx="24" fill="none" stroke="url(#ring)" stroke-width="2.5" stroke-dasharray="10 8"/>

  <!-- abstract person silhouette -->
  <circle cx="200" cy="158" r="62" fill="url(#person)"/>
  <path d="M70 360 C70 270 130 232 200 232 C270 232 330 270 330 360 Z" fill="url(#person)"/>

  <!-- subtle grid accents -->
  <circle cx="200" cy="158" r="62" fill="none" stroke="url(#ring)" stroke-width="2" opacity="0.35"/>

  <!-- camera / upload icon badge -->
  <g transform="translate(255 255)">
    <circle cx="0" cy="0" r="34" fill="#0a0e17" stroke="url(#ring)" stroke-width="2.5"/>
    <path d="M-14 -6 h6 l3 -5 h10 l3 5 h6 a3 3 0 0 1 3 3 v14 a3 3 0 0 1 -3 3 h-28 a3 3 0 0 1 -3 -3 v-14 a3 3 0 0 1 3 -3 Z"
          fill="none" stroke="url(#ring)" stroke-width="2.4" stroke-linejoin="round"/>
    <circle cx="0" cy="2" r="5.5" fill="none" stroke="url(#ring)" stroke-width="2.4"/>
  </g>

  <!-- label -->
  <text x="200" y="392" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#93a0b8" letter-spacing="1">
    Add your photo here
  </text>
</svg>
